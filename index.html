
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Water Operator Exam Prep (1,000 Question Matrix)</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #0284c7;
            --accent: #f59e0b;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
            --correct: #10b981;
            --wrong: #ef4444;
            --highlight: #fef08a;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--background); color: var(--text); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 3px solid var(--primary); }
        h1 { color: var(--primary); margin-bottom: 5px; }
        h2 { color: var(--secondary); border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1.3fr 0.7fr; } }
        .card { background: var(--surface); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); margin-bottom: 20px; }
        .controls-row { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 6px; }
        @media (min-width: 480px) { .controls-row { flex-direction: row; flex-wrap: wrap; align-items: flex-end; } }
        .select-group { display: flex; flex-direction: column; gap: 5px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer; user-select: none; }
        select { padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border); background: white; font-weight: bold; }
        .btn { background-color: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; height: 38px; }
        .btn:hover { background-color: var(--primary); }
        .option-label { display: block; padding: 12px; background: var(--background); border: 2px solid var(--border); border-radius: 6px; margin-bottom: 10px; cursor: pointer; user-select: none; }
        .option-label:hover { background: #e2e8f0; }
        
        .option-label.pre-highlight { background: var(--highlight); border-color: #facc15; }
        .option-label.correct-choice { background: #ecfdf5 !important; border-color: var(--correct) !important; color: #065f46; font-weight: bold; }
        .option-label.wrong-choice { background: #fef2f2 !important; border-color: var(--wrong) !important; color: #991b1b; }
        
        .rationale-box { margin-top: 15px; padding: 15px; background: #eff6ff; border-left: 4px solid var(--secondary); border-radius: 4px; }
        .meta-bar { display: flex; justify-content: space-between; font-weight: bold; background: #e2e8f0; padding: 8px 12px; border-radius: 6px; margin-bottom: 15px; }
        .formula-sheet { background: #f1f5f9; font-family: monospace; font-size: 0.9rem; padding: 12px; border-radius: 4px; max-height: 400px; overflow-y: auto; }
        footer { margin-top: 50px; padding: 20px; background: #1e293b; color: #cbd5e1; border-radius: 8px; font-size: 0.85rem; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>California Water Operator Exam Prep</h1>
        <p>Dynamic 1,000 Question Testing Matrix for SWRCB T1-T5 & D1-D5 Certifications.</p>
    </header>

    <div class="grid">
        <div>
            <div class="card">
                <h2>Practice Exam Module</h2>
                
                <div id="setup-controls" class="controls-row">
                    <div class="select-group">
                        <label for="track-select">Select Discipline:</label>
                        <select id="track-select" onchange="updateGradeDropdown()">
                            <option value="treatment">Treatment (T-Series)</option>
                            <option value="distribution">Distribution (D-Series)</option>
                        </select>
                    </div>
                    <div class="select-group">
                        <label for="grade-select">Select Target Grade Level:</label>
                        <select id="grade-select"></select>
                    </div>
                    <div class="select-group">
                        <label class="checkbox-group"><input type="checkbox" id="timer-toggle" checked> Timed (3 Hrs)</label>
                    </div>
                    <div class="select-group">
                        <label class="checkbox-group"><input type="checkbox" id="highlight-toggle"> Study Highlights</label>
                    </div>
                    <button class="btn" onclick="startExam()">Launch 100-Q Exam</button>
                </div>

                <div id="quiz-container" class="hidden">
                    <div class="meta-bar">
                        <span id="quiz-track-title">Exam Status</span>
                        <span id="timer-display">03:00:00</span>
                    </div>
                    <p style="font-weight: bold; font-size: 1.15rem;" id="question-text">Loading...</p>
                    <div id="options-container"></div>
                    
                    <div id="rationale-container" class="rationale-box hidden"></div>
                    <button id="advance-btn" class="btn hidden" style="width:100%; margin-top:15px;" onclick="nextQuestion()">Advance Question</button>
                </div>
